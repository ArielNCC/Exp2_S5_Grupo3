spring.application.name=LearningPlatform
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Configuración H2 - consola
spring.h2.console.path=/h2-console
spring.h2.console.enabled=true
# Configuracion H2
spring.datasource.url=jdbc:h2:mem:cursosdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Configurcion Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
# management.endpoint.env.show-values=ALWAYS

# Configuracion Actuator/info
info.app.name=Microservicio de Cursos LearningPlatform
info.app.description=Este microservicio del Backend gestiona los cursos de la plataforma con SpringBoot y H2.
info.app.version=1.0.0

app.cursos.prioridad=true,false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG



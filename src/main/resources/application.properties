spring.application.name=LearningPlatform
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Configuración H2 - consola
spring.h2.console.path=/h2-console
spring.h2.console.enabled=true
# Configuracion H2
spring.datasource.url=jdbc:h2:mem:cursosdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

app.cursos.prioridad=true,false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

info.app.name=LearningPlatform
info.app.version=1.0.0
info.app.description=API de cursos con Spring Boot y H2